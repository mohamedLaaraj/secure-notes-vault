<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password · Secure Notes Vault</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%2338bdf8' d='M464 64H48C21.5 64 0 85.5 0 112v288c0 26.5 21.5 48 48 48h416c26.5 0 48-21.5 48-48V112c0-26.5-21.5-48-48-48zM256 384c-70.7 0-128-57.3-128-128s57.3-128 128-128 128 57.3 128 128-57.3 128-128 128zM256 224a32 32 0 1 0 0 64 32 32 0 1 0 0-64z'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03060f);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(56,189,248,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
        }

        .card {
            position: relative; z-index: 1;
            background: rgba(15,23,42,.97);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 32px;
            border: 1px solid rgba(56,189,248,.4);
            text-align: center;
            width: 400px;
            max-width: 95vw;
            box-shadow: 0 0 40px rgba(56,189,248,.08);
            animation: fadeInUp .3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon { font-size: 48px; color: #38bdf8; margin-bottom: 1rem; }
        h2 { color: #38bdf8; margin-bottom: .4rem; font-size: 1.4rem; }
        .sub { color: #64748b; font-size: .8rem; margin-bottom: 1.8rem; letter-spacing: .2px; }

        .form { display: flex; flex-direction: column; gap: .75rem; }

        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 40px !important; }
        .toggle-password {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            color: #4a5568; cursor: pointer; font-size: .9rem;
            transition: color .2s;
        }
        .toggle-password:hover { color: #38bdf8; }

        input {
            width: 100%; padding: 12px 14px;
            background: #0a0f1f;
            border: 1px solid #2d3a5e;
            border-radius: 12px;
            color: white; font-size: .9rem;
            transition: all .2s;
        }
        input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56,189,248,.2); }

        .strength-bar-wrap { background: #0d1526; border-radius: 4px; height: 5px; }
        .strength-bar { height: 5px; border-radius: 4px; transition: width .3s, background .3s; width: 0%; }
        .strength-text { font-size: .72rem; color: #64748b; text-align: right; margin-top: 2px; display: block; }

        .btn {
            padding: 12px;
            border: none; border-radius: 12px;
            font-size: .95rem; font-weight: 600;
            cursor: pointer; transition: all .2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, #0369a1, #0ea5e9); color: white; }
        .btn-primary:hover { filter: brightness(1.12); box-shadow: 0 4px 16px rgba(14,165,233,.4); }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; filter: none; box-shadow: none; }

        .btn-link {
            background: none; border: none; color: #38bdf8;
            font-size: .8rem; cursor: pointer; margin-top: 4px;
            padding: 4px; opacity: .8; transition: opacity .2s;
        }
        .btn-link:hover { opacity: 1; text-decoration: underline; }

        .msg {
            font-size: .83rem; padding: 10px 14px;
            border-radius: 10px; text-align: left;
            display: none;
        }
        .msg.success {
            display: block; background: rgba(20,83,45,.3);
            border: 1px solid #166534; color: #4ade80;
        }
        .msg.error {
            display: block; background: rgba(127,29,29,.3);
            border: 1px solid #7f1d1d; color: #fca5a5;
        }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,.2);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .back-link { margin-top: 1.2rem; }
        .back-link a { color: #64748b; font-size: .78rem; text-decoration: none; }
        .back-link a:hover { color: #38bdf8; }

        /* Success state */
        .success-state { display: none; text-align: center; }
        .success-state i { font-size: 48px; color: #4ade80; margin-bottom: 1rem; }
        .success-state h3 { color: #4ade80; margin-bottom: .5rem; }
        .success-state p { color: #64748b; font-size: .85rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
<div class="cyber-grid"></div>

<div class="card">
    <!-- ICON -->
    <div class="icon"><i class="fas fa-shield-alt"></i></div>
    <h2>Set New Password</h2>
    <p class="sub">Enter your new password below to secure your vault.</p>

    <!-- RESET FORM -->
    <div id="resetForm" class="form">
        <div class="password-wrapper">
            <input type="password" id="newPassword" placeholder="New password (min. 8 chars)">
            <i class="fas fa-eye-slash toggle-password" id="toggleNew" title="Show/hide password"></i>
        </div>
        <div>
            <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
            <span class="strength-text" id="strengthText"></span>
        </div>
        <div class="password-wrapper">
            <input type="password" id="confirmPassword" placeholder="Confirm new password">
            <i class="fas fa-eye-slash toggle-password" id="toggleConfirm" title="Show/hide password"></i>
        </div>
        <button class="btn btn-primary" id="resetBtn">
            <i class="fas fa-lock"></i> Set New Password
        </button>
        <div id="msgBox" class="msg"></div>
    </div>

    <!-- SUCCESS STATE (shown after successful reset) -->
    <div class="success-state" id="successState">
        <i class="fas fa-check-circle"></i>
        <h3>Password Reset!</h3>
        <p>Your vault password has been updated successfully.</p>
        <button class="btn btn-primary" onclick="window.location.href='1_notes.html'">
            <i class="fas fa-sign-in-alt"></i> Back to Login
        </button>
    </div>

    <div class="back-link">
        <a href="1_notes.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8000/api';

    // Extract token & email from URL query params
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const email  = params.get('email');

    if (!token || !email) {
        showMsg('error', 'Invalid or expired reset link. Please request a new one.');
        document.getElementById('resetBtn').disabled = true;
    }

    // Password strength
    const strengthBar  = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#10b981'];
    const labels = ['Too weak','Weak','Fair','Good','Strong'];

    function calcScore(pw) {
        let score = 0;
        if (pw.length >= 8) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        if (pw.length >= 12) score++;
        return Math.min(score, 4);
    }

    document.getElementById('newPassword').addEventListener('input', function() {
        const score = calcScore(this.value);
        strengthBar.style.width = ((score + 1) * 20) + '%';
        strengthBar.style.background = colors[score];
        strengthText.textContent = this.value ? labels[score] : '';
        strengthText.style.color = colors[score];
    });

    // Toggle visibility
    function toggleVis(inputId, iconId) {
        const inp  = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        const show = inp.type === 'password';
        inp.type   = show ? 'text' : 'password';
        icon.className = show ? 'fas fa-eye toggle-password' : 'fas fa-eye-slash toggle-password';
    }
    document.getElementById('toggleNew').addEventListener('click',     () => toggleVis('newPassword',     'toggleNew'));
    document.getElementById('toggleConfirm').addEventListener('click', () => toggleVis('confirmPassword', 'toggleConfirm'));

    // Submit
    document.getElementById('confirmPassword').addEventListener('keypress', e => { if (e.key === 'Enter') doReset(); });
    document.getElementById('resetBtn').addEventListener('click', doReset);

    async function doReset() {
        const password              = document.getElementById('newPassword').value;
        const password_confirmation = document.getElementById('confirmPassword').value;
        const btn                   = document.getElementById('resetBtn');

        hideMsg();

        if (!password || password.length < 8) {
            showMsg('error', 'Password must be at least 8 characters.');
            return;
        }
        if (calcScore(password) < 3) {
            showMsg('error', 'Password is too weak. Mix uppercase, numbers, and symbols.');
            return;
        }
        if (password !== password_confirmation) {
            showMsg('error', 'Passwords do not match.');
            return;
        }

        btn.disabled  = true;
        btn.innerHTML = '<span class="spinner"></span> Resetting...';

        try {
            const res  = await fetch(`${API_BASE}/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ token, email, password, password_confirmation }),
            });
            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.message || 'Reset failed.');
            }

            // Show success
            document.getElementById('resetForm').style.display  = 'none';
            document.getElementById('successState').style.display = 'block';
        } catch (err) {
            showMsg('error', err.message);
            btn.disabled  = false;
            btn.innerHTML = '<i class="fas fa-lock"></i> Set New Password';
        }
    }

    function showMsg(type, text) {
        const el = document.getElementById('msgBox');
        el.className = 'msg ' + type;
        el.textContent = text;
    }
    function hideMsg() {
        const el = document.getElementById('msgBox');
        el.className = 'msg';
        el.style.display = 'none';
    }
</script>
</body>
</html>
